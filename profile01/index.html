<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自己紹介</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p&family=M+PLUS+Rounded+1c&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "M PLUS Rounded 1c", sans-serif;
            letter-spacing: 10px;
            color: rgb(95, 92, 92);
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #f5b090, #fcd7a1, #fff9b1, #a5d4ad, #a3bce2, #a59aca, #cfa7cd) 0 / 200% 100%;
            position: relative;
            animation: bg-gradient 3s linear infinite alternate;
        }

        @keyframes bg-gradient {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 100% 0;
            }
        }

        .container {
            width: calc(100vw - 80px);
            height: calc(100vh - 80px);
            background-color: #fff8f8;
            position: absolute;
            top: 40px;
            right: 40px;
            bottom: 40px;
            left: 40px;
            overflow: hidden;
            border-radius: 20px;
        }

        .container_inner {
            padding: 50px;
            overflow-y: auto;
            height: 100%;
            position: relative;
        }

        .img {
            width: 300px;
            position: fixed;
            margin: 60px 30px 0px 60px;
        }

        .img p {
            text-align: center;
        }

        .img img {
            width: 300px;
            height: 300px;
            border-radius: 30px;
        }

        .container_inner .txt {
            width: calc(100% - 450px);
            padding-bottom: 40px;
            position: absolute;
            top: 60px;
            right: 40px;
        }

        .container_inner .txt h1 {
            width: fit-content;
            border-bottom: 10px rgb(95, 92, 92) solid;
            font-size: 36px;
            margin-bottom: 40px;
        }

        .container_inner .txt h2 {
            font-size: 26px;
            margin-bottom: 20px;
            padding-left: 140px;
            text-indent: -140px;
            text-align: justify;
        }

        .container_inner .txt p {
            font-size: 26px;
            font-weight: bold;
            line-height: 1.8;
        }

        .container_inner .txt h2:last-of-type {
            margin-bottom: 50px;
        }

        .container_inner .txt h2 .colon {
            font-size: 22px;
            vertical-align: 4px;
        }

        .container_inner .txt p.greeting {
            text-align: right;
            margin-top: 30px;
            padding-bottom: 40px;
        }
    </style>
    <style media="print">
        .img {
            width: 210px;
            position: fixed;
            margin: 40px 30px 0px 40px;
        }

        .img p {
            text-align: center;
        }

        .img img {
            width: 210px;
            height: 210px;
            border-radius: 30px;
        }

        .container {
            width: calc(100vw - 40px);
            height: calc(100vh - 40px);
            background-color: #fff8f8;
            position: absolute;
            top: 20px;
            right: 20px;
            bottom: 20px;
            left: 20px;
            overflow: hidden;
            border-radius: 20px;
        }

        .container_inner {
            padding: 20px;
        }

        .container_inner .txt {
            width: calc(100% - 350px);
            padding-bottom: 0px;
            position: absolute;
            top: 60px;
            right: 40px;
        }

        .container_inner .txt h1 {
            width: fit-content;
            border-bottom: 10px rgb(95, 92, 92) solid;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .container_inner .txt h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-left: 140px;
            text-indent: -140px;
            text-align: justify;
        }

        .container_inner .txt p {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="img">
            <p><img src="me.jpg" alt="" /></p>
        </div>
        <div class="container_inner">
            <div class="txt">
                <h1>プロフィール</h1>
                <h2>名　前<span class="colon">：</span>村上英輝</h2>
                <h2>年　齢<span class="colon">：</span>46歳</h2>
                <h2>居住地<span class="colon">：</span>奈良市</h2>
                <h2>趣　味<span class="colon">：</span>読書・散歩・買い物・古いアニメを見る</h2>
                <h1>好きなもの</h1>
                <p>一人で過ごす時間が好きで、平日・休日問わず趣味や勉強などやりたいことをして生活しています。最近、少し前のデジタル一眼レフを買ってよく撮影しています。</p>
                <p class="greeting">よろしくお願いします。</p>
            </div>
        </div>
    </div>
</body>

</html>
